<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Wizard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <header class="w-full max-w-md text-center my-6">
        <h1 class="text-3xl font-extrabold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> AI Photo Wizard
        </h1>
    </header>

    <main class="w-full max-w-md glass rounded-3xl p-6 flex flex-col gap-6 shadow-2xl">
        <div id="dropzone"
            class="border-2 border-dashed border-slate-700 hover:border-blue-500 rounded-2xl p-8 flex flex-col items-center justify-center gap-3 cursor-pointer transition-all bg-slate-900/50">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <i id="uploadIcon" class="fa-solid fa-cloud-arrow-up text-4xl text-blue-400"></i>
            <p id="uploadText" class="text-sm font-medium text-slate-300">Tap to select photo</p>
        </div>

        <div id="previewContainer" class="hidden flex-col items-center gap-2">
            <img id="imagePreview" class="w-full h-48 object-contain rounded-xl border border-slate-800" src=""
                alt="Preview">
        </div>

        <div class="flex flex-col gap-3">
            <button onclick="processImage('bg-remove')"
                class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95">
                <i class="fa-solid fa-scissors mr-2"></i> Remove Background
            </button>
            <button onclick="processImage('enhance')"
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95">
                <i class="fa-solid fa-wand-magic mr-2"></i> Enhance Quality
            </button>
        </div>

        <div id="loadingState" class="hidden flex-col items-center py-4 gap-2">
            <div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
            <p class="text-sm text-blue-400 animate-pulse">AI is working its magic...</p>
        </div>

        <div id="resultContainer" class="hidden flex-col items-center gap-4 border-t border-slate-800 pt-6">
            <img id="resultImage" class="w-full h-56 object-contain rounded-xl bg-slate-900 border border-slate-800"
                src="" alt="Result">
            <a id="downloadBtn" href="#" download="output.png"
                class="w-full text-center bg-slate-800 hover:bg-slate-700 py-3 rounded-xl transition-all">
                <i class="fa-solid fa-download mr-1"></i> Download
            </a>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById("fileInput"), dropzone = document.getElementById("dropzone"), imagePreview = document.getElementById("imagePreview"), previewContainer = document.getElementById("previewContainer"), resultContainer = document.getElementById("resultContainer"), resultImage = document.getElementById("resultImage"), downloadBtn = document.getElementById("downloadBtn"), loadingState = document.getElementById("loadingState");

        const API_BASE_URL = "https://photo-enhance-backendu.onrender.com";

        dropzone.addEventListener("click", () => fileInput.click());

        fileInput.addEventListener("change", function () {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                previewContainer.style.display = "flex";
                resultContainer.style.display = "none";
                document.getElementById("uploadText").innerText = file.name;
            };
            reader.readAsDataURL(file);
        });

        async function processImage(taskType) {
            const file = fileInput.files[0];
            if (!file) return alert("Pehle photo select karo!");

            loadingState.style.display = "flex";
            resultContainer.style.display = "none";

            const formData = new FormData();
            formData.append("file", file);
            formData.append("task_type", taskType);

            try {
                const response = await fetch("https://photo-enhance-backendu.onrender.com/api/tasks/", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Server Error");

                const blob = await response.blob();
                const imageURL = URL.createObjectURL(blob);

                resultImage.src = imageURL;
                downloadBtn.href = imageURL;
                resultContainer.style.display = "flex";
            } catch (error) {
                console.error(error);
                alert("Error: Backend se connect nahi ho pa raha.");
            } finally {
                loadingState.style.display = "none";
            }
        }
    </script>
</body>

</html>
